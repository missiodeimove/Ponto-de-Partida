<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Discipulado · Igreja Redenção</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior:smooth; }

:root {
  --bg:      #F7F6F4;
  --surface: #FFFFFF;
  --border:  #E4E2DD;
  --border2: #EEECE8;
  --text:    #1C1917;
  --text2:   #57534E;
  --text3:   #A8A29E;
  --gold:    #A67C52;
  --gold-bg: #F5F0E8;
  --green:   #4A7C5E;
  --radius:  8px;
  --shadow:  0 1px 2px rgba(0,0,0,0.05);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-weight: 400;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.screen { display:none; min-height:100vh; flex-direction:column; }
.screen.active { display:flex; }

/* ─── HOME ─── */
.home-top {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 2.4rem 1.5rem 1.8rem;
  text-align: center;
}
.logo-img { height: 34px; margin-bottom: 1.5rem; }
.home-top h1 {
  font-family: 'Lora', serif;
  font-size: 1.5rem; font-weight: 400; line-height: 1.3;
  color: var(--text); margin-bottom: 0.3rem;
}
.home-top h1 em { font-style: italic; color: var(--gold); }
.home-top .cap {
  font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--text3); font-weight: 500;
}

.how-block {
  margin: 1.2rem 1.5rem 0;
  background: var(--gold-bg);
  border: 1px solid #E8DDD0;
  border-radius: var(--radius);
  padding: 1rem 1.2rem;
}
.how-ttl { font-size:0.6rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:0.7rem; }
.how-row { display:flex; align-items:flex-start; gap:0.65rem; margin-bottom:0.4rem; }
.how-row:last-child { margin-bottom:0; }
.how-icon { font-size:0.85rem; flex-shrink:0; margin-top:0.05rem; }
.how-text { font-size:0.76rem; line-height:1.5; color:var(--text2); }
.how-text b { color:var(--text); font-weight:500; }

.sec-label {
  padding: 1.4rem 1.5rem 0.55rem;
  font-size:0.6rem; letter-spacing:0.18em; text-transform:uppercase;
  color:var(--text3); font-weight:600;
}

.study-list { padding:0 1.5rem 5rem; display:flex; flex-direction:column; gap:0.45rem; }

.study-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.95rem 1.1rem;
  display: flex; align-items:center; gap:0.9rem;
  cursor: pointer; box-shadow: var(--shadow);
  transition: border-color 0.2s, background 0.15s;
  -webkit-user-select:none;
}
.study-card:active { background: var(--bg); }
.study-card.done { border-color: #C4A882; }

.s-num {
  width:30px; height:30px; border-radius:50%;
  border:1.5px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:0.62rem; font-weight:600; color:var(--text3);
  flex-shrink:0; transition:all 0.2s;
}
.study-card.done .s-num { background:var(--gold-bg); border-color:#C4A882; color:var(--gold); }

.s-info { flex:1; min-width:0; }
.s-name { font-size:0.87rem; font-weight:500; color:var(--text); margin-bottom:0.1rem; }
.s-desc { font-size:0.7rem; color:var(--text3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.s-arrow { font-size:0.8rem; color:var(--text3); flex-shrink:0; }
.study-card.done .s-arrow { color:var(--gold); }

/* ─── STUDY ─── */
.study-topbar {
  position:sticky; top:0; z-index:20;
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:0.8rem 1.2rem;
  display:flex; align-items:center; gap:0.8rem;
}
.btn-back {
  background:none; border:1px solid var(--border);
  color:var(--text2); font-size:0.7rem; font-weight:500;
  padding:0.4rem 0.75rem; border-radius:5px;
  cursor:pointer; font-family:'Inter',sans-serif;
  transition:background 0.15s; flex-shrink:0;
}
.btn-back:active { background:var(--bg); }
.tb-info { flex:1; min-width:0; }
.tb-num { font-size:0.58rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold); font-weight:600; }
.tb-name { font-size:0.82rem; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.done-pill {
  font-size:0.6rem; font-weight:600;
  background:#EEF5F1; border:1px solid #B8D4C6;
  color:var(--green); padding:0.2rem 0.5rem; border-radius:20px; flex-shrink:0;
}

.progress-bar { height:2px; background:var(--border2); }
.progress-fill { height:100%; background:var(--gold); transition:width 0.4s ease; }

.card-area { flex:1; position:relative; overflow:hidden; }

.scard {
  position:absolute; top:0; left:0; right:0;
  padding:1.4rem 1.5rem 2rem;
  opacity:0; transform:translateX(20px);
  transition:opacity 0.28s ease, transform 0.28s ease;
  pointer-events:none; overflow-y:auto;
  max-height:calc(100vh - 165px);
}
.scard.active { opacity:1; transform:translateX(0); pointer-events:all; }
.scard.exit-l { opacity:0; transform:translateX(-20px); }

.c-label {
  font-size:0.58rem; letter-spacing:0.2em; text-transform:uppercase;
  color:var(--gold); font-weight:600; margin-bottom:0.85rem;
  display:flex; align-items:center; gap:0.6rem;
}
.c-label::after { content:''; flex:1; height:1px; background:var(--border); }

.c-title {
  font-family:'Lora',serif;
  font-size:1.4rem; font-weight:400; line-height:1.25;
  color:var(--text); margin-bottom:1rem;
}
.c-title em { font-style:italic; color:var(--gold); }

.c-body { font-size:0.845rem; line-height:1.8; color:var(--text2); font-weight:300; }
.c-body p { margin-bottom:0.7rem; }
.c-body p:last-child { margin-bottom:0; }
.c-body strong { color:var(--text); font-weight:500; }

.verse-box {
  margin-top:1.1rem;
  border-left:2px solid var(--gold);
  background:var(--gold-bg);
  padding:0.8rem 1rem;
  border-radius:0 5px 5px 0;
}
.verse-box p {
  font-family:'Lora',serif; font-style:italic;
  font-size:0.95rem; line-height:1.55; color:var(--text); margin-bottom:0.25rem;
}
.verse-box cite {
  font-size:0.58rem; font-weight:600; letter-spacing:0.15em;
  text-transform:uppercase; color:var(--gold); font-style:normal;
}

.points-list { list-style:none; margin:0.7rem 0; }
.points-list li {
  display:flex; gap:0.6rem; align-items:flex-start;
  font-size:0.83rem; line-height:1.65; color:var(--text2);
  padding:0.48rem 0; border-bottom:1px solid var(--border2);
}
.points-list li:last-child { border-bottom:none; }
.points-list li::before { content:'—'; color:var(--gold); flex-shrink:0; margin-top:0.05rem; }
.points-list li strong { color:var(--text); font-weight:500; }

.optional-box {
  margin-top:1rem; background:var(--surface);
  border:1px solid var(--border); border-radius:var(--radius);
  padding:0.7rem 0.95rem;
}
.opt-label { font-size:0.56rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--text3); font-weight:600; margin-bottom:0.3rem; }
.optional-box p { font-size:0.77rem; color:var(--text2); line-height:1.6; }

/* Video */
.video-thumb-wrap {
  margin-bottom:0.9rem; border-radius:var(--radius); overflow:hidden;
  border:1px solid var(--border); position:relative;
  background:#111; display:block; text-decoration:none;
}
.video-thumb-wrap img { width:100%; display:block; aspect-ratio:16/9; object-fit:cover; opacity:0.92; }
.play-btn {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:56px; height:56px;
  background:rgba(255,255,255,0.95); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 12px rgba(0,0,0,0.28);
  transition: transform 0.15s;
}
.video-thumb-wrap:active .play-btn { transform:translate(-50%,-50%) scale(0.93); }
.play-btn svg { margin-left:3px; }
.video-label {
  position:absolute; bottom:0; left:0; right:0;
  background:linear-gradient(transparent, rgba(0,0,0,0.55));
  padding:1.2rem 0.9rem 0.7rem;
  font-size:0.7rem; color:rgba(255,255,255,0.9);
  font-weight:500; letter-spacing:0.04em;
}
.video-note { font-size:0.7rem; color:var(--text3); text-align:center; margin-top:0.5rem; }

/* Final */
.final-scard { text-align:center; }
.final-icon { font-size:1.7rem; margin-bottom:0.85rem; }
.complete-btn {
  margin-top:1.2rem; width:100%;
  background:var(--text); color:#fff; border:none;
  padding:0.85rem; border-radius:var(--radius);
  font-family:'Inter',sans-serif; font-size:0.76rem; font-weight:600;
  letter-spacing:0.08em; text-transform:uppercase;
  cursor:pointer; transition:opacity 0.2s;
}
.complete-btn:active { opacity:0.8; }
.complete-btn.done-st { background:var(--green); }

/* Nav */
.study-nav {
  position:sticky; bottom:0;
  background:rgba(247,246,244,0.97); backdrop-filter:blur(8px);
  border-top:1px solid var(--border);
  padding:0.8rem 1.2rem;
  display:flex; align-items:center; justify-content:space-between; gap:0.8rem;
}
.nav-btn {
  background:none; border:1px solid var(--border);
  color:var(--text2); font-family:'Inter',sans-serif;
  font-size:0.68rem; font-weight:500; letter-spacing:0.08em; text-transform:uppercase;
  padding:0.52rem 0.95rem; border-radius:5px;
  cursor:pointer; transition:all 0.15s; min-width:68px;
}
.nav-btn:disabled { opacity:0.25; cursor:default; }
.nav-btn.fwd:not(:disabled) { border-color:#C4A882; color:var(--gold); background:var(--gold-bg); }
.nav-btn:not(:disabled):active { background:var(--bg); }

.nav-dots { display:flex; gap:5px; align-items:center; justify-content:center; flex-wrap:wrap; max-width:90px; }
.ndot { width:5px; height:5px; border-radius:50%; background:var(--border); transition:background 0.2s, transform 0.2s; }
.ndot.active { background:var(--gold); transform:scale(1.4); }

::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>

<script>
const STUDIES = [
  { id:1, title:"A Criação", sub:"Quem Deus é e quem nós somos", yt:"wcAifkNJTeg",
    cards:[
      { lbl:"Estudo 01", title:"O <em>Ponto de Partida</em>",
        body:`<p>A fé cristã não se inicia na experiência humana, mas em <strong>Deus como Criador</strong> de todas as coisas. Antes de qualquer pergunta sobre quem somos, há uma resposta que precede tudo.</p>`,
        verse:{t:"No princípio, Deus criou os céus e a terra.",r:"Gênesis 1:1"} },
      { lbl:"Identidade", title:"Antes da função, <em>o ser</em>",
        body:`<p>Nosso valor não está no que fazemos, mas em quem somos — criados com propósito eterno. Num mundo que mede as pessoas pelo desempenho, o Criador diz o contrário: tu tens valor antes de qualquer conquista.</p>`,
        verse:{t:"Criou Deus o homem à sua imagem, à imagem de Deus o criou.",r:"Gênesis 1:27"} },
      { lbl:"A Criação", title:"Com ordem, beleza <em>e intenção</em>",
        pts:["<strong>Ex nihilo:</strong> Deus criou tudo do nada, com ordem, beleza e intenção.",
             "<strong>Imagem e Semelhança:</strong> Homem e mulher são complementares, chamados à comunhão.",
             "<strong>A Origem do Mal:</strong> O mal surge de uma rebelião espiritual fundada no orgulho e na rejeição à autoridade de Deus."],
        verse:{t:"Deus viu tudo o que havia feito e era muito bom.",r:"Gênesis 1:31"},
        opt:"Ler Gênesis capítulos 1 e 2" }
    ]
  },
  { id:2, title:"O Problema", sub:"A raiz do pecado e suas consequências", yt:"b1Ao9jPm274",
    cards:[
      { lbl:"Estudo 02", title:"A raiz <em>do pecado</em>",
        body:`<p>O problema não começa com ações — começa com uma escolha de direção. Aqui vemos a raiz do pecado e suas consequências na vida humana.</p>`,
        verse:{t:"Pois todos pecaram e estão destituídos da glória de Deus.",r:"Romanos 3:23"} },
      { lbl:"O Engano", title:"A dinâmica <em>da queda</em>",
        pts:["<strong>Liberdade para Amar:</strong> Deus nos deu vontade própria, pois o amor verdadeiro só existe onde há escolha.",
             "<strong>A Dinâmica do Engano:</strong> O pecado nasce da dúvida sobre Deus e se expressa em desejos desordenados.",
             "<strong>As Três Mortes:</strong> A queda gera separação espiritual, fragilidade física e ruptura nos relacionamentos."],
        verse:{t:"O salário do pecado é a morte, mas o dom gratuito de Deus é a vida eterna.",r:"Romanos 6:23"} },
      { lbl:"Consequências", title:"A nova <em>condição humana</em>",
        body:`<p>Medo, culpa e vergonha passam a dominar o coração humano, levando à fuga de Deus e à acusação do outro.</p><p>As tentativas humanas de encobrir o pecado são insuficientes. Deus provê redenção através de sacrifício.</p>`,
        opt:"Ler Gênesis capítulo 3 e Romanos capítulo 3" }
    ]
  },
  { id:3, title:"A Lei e a Graça", sub:"Como Deus age para restaurar o ser humano", yt:"5ZvzKD_9kLU",
    cards:[
      { lbl:"Estudo 03", title:"Deus como <em>Pai</em>, não como sistema",
        body:`<p>A relação com Deus é baseada em <strong>pertencimento, não em desempenho</strong>. Graça antes das regras: Deus liberta antes de instruir — a obediência nasce da redenção, não o contrário.</p>`,
        verse:{t:"Pois vocês são salvos pela graça, por meio da fé, e isto não vem de vocês, é dom de Deus.",r:"Efésios 2:8-9"} },
      { lbl:"A Lei", title:"O que a Lei <em>revela</em>",
        pts:["<strong>A Função da Lei:</strong> A Lei revela o pecado, mas não salva; ela aponta para a necessidade de um Salvador.",
             "<strong>Da Lei à Cruz:</strong> Moisés revela a dívida; Jesus a paga completamente através do sacrifício.",
             "<strong>Obediência como Resposta:</strong> Vivemos em obediência não para sermos aceitos, mas porque já fomos amados e salvos."],
        verse:{t:"Cristo é o fim da lei para a justiça de todo aquele que crê.",r:"Romanos 10:4"},
        opt:"Ler Êxodo capítulo 20 e Efésios capítulo 2" }
    ]
  },
  { id:4, title:"Confiar", sub:"O relacionamento com Deus começa pela fé", yt:"gkEIxmSR5qE",
    cards:[
      { lbl:"Estudo 04", title:"Deus age <em>na bagunça</em>",
        body:`<p>A humanidade vive num cenário de separação e injustiça. Deus não fica assistindo de longe — como um pai que entra numa cozinha cheia de cacos de vidro para resgatar o filho, Ele escolhe <strong>entrar na nossa realidade.</strong></p>`,
        verse:{t:"Abraão creu em Deus, e isso lhe foi creditado como justiça.",r:"Romanos 4:3"} },
      { lbl:"Confiança", title:"Aceitação como <em>ponto de partida</em>",
        pts:["<strong>Relacionamento, não sistema:</strong> A solução de Deus não foi filosofia ou regras, mas um relacionamento pessoal com um homem comum: Abraão.",
             "<strong>Confiança como 'Justiça':</strong> Abraão escolheu acreditar no impossível. Essa confiança foi creditada como justiça — não por ser perfeito, mas por confiar.",
             "<strong>Obediência como Gratidão:</strong> Primeiro Deus liberta e ama; depois Ele dá as diretrizes. Obedecemos como resposta ao amor."],
        opt:"Ler Gênesis 15 e Romanos 4" }
    ]
  },
  { id:5, title:"Quem é Jesus?", sub:"A pergunta mais fundamental da história", yt:"oJXKjtVPDZE",
    cards:[
      { lbl:"Estudo 05", title:"Muito além de <em>um Mestre</em>",
        body:`<p>Muitos o veem apenas como um grande líder. Mas a Bíblia o apresenta como o <strong>centro de toda a narrativa bíblica</strong>. Ele não é um personagem que entra na história; Ele é o autor dela.</p>`,
        verse:{t:"Porque Deus amou o mundo de tal maneira que deu o seu Filho unigênito, para que todo aquele que nele crê não pereça, mas tenha a vida eterna.",r:"João 3:16"} },
      { lbl:"O Diagnóstico", title:"A iniciativa <em>do amor</em>",
        pts:["<strong>O Diagnóstico do Coração:</strong> O pecado não é apenas errar — é tentar construir a vida sem o Criador.",
             "<strong>A Iniciativa do Amor:</strong> Deus não esperou que nos consertássemos. Ele veio até nós no nosso ponto mais baixo.",
             "<strong>O Sacrifício Definitivo:</strong> Jesus se torna o 'Cordeiro de Deus', pagando o custo do pecado e restaurando a conexão com o Pai."],
        verse:{t:"Eu sou o caminho, a verdade e a vida. Ninguém vem ao Pai, a não ser por mim.",r:"João 14:6"} },
      { lbl:"Resposta", title:"<em>Arrependimento</em> e Fé",
        body:`<p><strong>Arrependimento:</strong> Não é apenas sentir culpa, mas reconhecer o erro e mudar a rota completamente.</p><p><strong>Fé:</strong> Não é apenas acreditar intelectualmente — é o ato de entregar o controle da vida a Jesus. Uma nova vida que começa <strong>hoje.</strong></p>`,
        opt:"Ler João capítulos 1 e 3" }
    ]
  },
  { id:6, title:"Favor Imerecido", sub:"O conceito radical da graça", yt:"W_wjFuCx0P4",
    cards:[
      { lbl:"Estudo 06", title:"O fim <em>da barganha</em>",
        body:`<p>Temos a tendência natural de negociar com Deus: <em>"Se o Senhor me ajudar, eu prometo..."</em> Vivemos num mundo de "não graça", onde tudo gira em torno de desempenho.</p><p><strong>O Evangelho é o contrário da religião:</strong> Religião é o esforço humano subindo até Deus. O Evangelho é Deus descendo até nós.</p>`,
        verse:{t:"Pois vocês são salvos pela graça, por meio da fé, e isto não vem de vocês, é dom de Deus.",r:"Efésios 2:8-9"} },
      { lbl:"A Graça", title:"A nova <em>matemática</em> de Deus",
        pts:["<strong>Definição:</strong> Graça é favor imerecido. Um presente que não depende de quem recebe, mas da generosidade de quem dá.",
             "<strong>A Nova Matemática:</strong> O nosso melhor dia não faz com que Ele nos ame mais, e o nosso pior dia não faz com que Ele nos ame menos.",
             "<strong>Obediência como Resposta:</strong> A motivação muda de 'eu preciso' para 'eu quero'. Fazemos o bem porque já fomos amados e aceitos."],
        opt:"Ler Lucas 15 (Filho Pródigo) e Mateus 20 (Trabalhadores na Vinha)" }
    ]
  },
  { id:7, title:"A Fé", sub:"De escravos para filhos", yt:"qJU1Aa8CO_E",
    cards:[
      { lbl:"Estudo 07", title:"Mortos, <em>não doentes</em>",
        body:`<p>A Bíblia não diz que estamos apenas fracos. O diagnóstico é claro: estávamos <strong>mortos em nossos delitos e pecados.</strong> Um morto não pode se salvar — a iniciativa do resgate precisa vir totalmente de Deus.</p>`,
        verse:{t:"Ele vos deu vida, estando vós mortos nos vossos delitos e pecados.",r:"Efésios 2:1"} },
      { lbl:"A Tríplice", title:"Mas <em>Deus</em>: a reviravolta",
        body:`<p>Sem Cristo, o ser humano está preso por três forças: <strong>o mundo</strong> (valores contrários a Deus), <strong>o maligno</strong> (influência espiritual do mal) e <strong>a carne</strong> (natureza pecaminosa).</p><p>Aqui está uma das expressões mais poderosas do evangelho: <strong>"Mas Deus."</strong> A salvação não começa no homem. Começa em Deus.</p>`,
        verse:{t:"Mas Deus, sendo rico em misericórdia, por causa do grande amor com que nos amou...",r:"Efésios 2:4-5"} },
      { lbl:"3 Dimensões", title:"O que é <em>realmente</em> a fé",
        pts:["<strong>Conhecimento:</strong> Saber quem Cristo é, sua obra na cruz e sua ressurreição.",
             "<strong>Convicção:</strong> Crer que essa verdade é real e digna de confiança.",
             "<strong>Entrega:</strong> Confiar pessoalmente em Cristo e render a vida a Ele — o passo decisivo."],
        verse:{t:"Se com a tua boca confessares Jesus como Senhor e em teu coração creres...",r:"Romanos 10:9"} },
      { lbl:"Modelo", title:"Clube vs. <em>Família</em>",
        pts:["<strong>Modelo Clube:</strong> Aceitação depende do que fazes. Obedeces para ser aceito. O motor é o medo.",
             "<strong>Modelo Família:</strong> Aceitação incondicional em Cristo. Obedeces porque já foste aceito. O motor é a gratidão.",
             "<strong>Frutos, não Raízes:</strong> As boas obras não são a raiz da salvação, mas o fruto dela."],
        verse:{t:"Pois somos feitura dele, criados em Cristo Jesus para boas obras.",r:"Efésios 2:10"},
        opt:"Ler Efésios capítulo 2" }
    ]
  },
  { id:8, title:"O Convite", sub:"A graça como ponto de partida", yt:"W9BtiUC_JuY",
    cards:[
      { lbl:"Estudo 08", title:"Uma pergunta que <em>muda tudo</em>",
        body:`<p>Antes de falar sobre fé, doutrina ou regras, há uma pergunta: <em>"Quem é Jesus?"</em> Não é religiosa. Não é filosófica. É pessoal. E o ponto de partida dela tem um nome: <strong>graça.</strong></p>`,
        verse:{t:"Venham a mim, todos os que estão cansados e sobrecarregados, e eu lhes darei descanso.",r:"Mateus 11:28"} },
      { lbl:"O Abismo", title:"A condição <em>humana</em>",
        pts:["<strong>Deus:</strong> Criador perfeito e Juiz justo a quem todos devemos prestar contas.",
             "<strong>Homem:</strong> Criado para relacionamento com Deus, mas escolheu a rebelião.",
             "<strong>Morte:</strong> Consequência do pecado — separação de Deus da qual não escapamos sozinhos."],
        verse:{t:"O salário do pecado é a morte, mas o dom gratuito de Deus é a vida eterna em Cristo Jesus.",r:"Romanos 6:23"} },
      { lbl:"A Ponte", title:"Deus toma <em>a iniciativa</em>",
        body:`<p>Como o homem não pode se salvar, Deus constrói a ponte — através de Cristo. Na cruz, Jesus atuou como nosso <strong>substituto</strong>: carregou nossos pecados, recebeu o castigo que merecíamos.</p><p>Sua ressurreição provou que o sacrifício foi aceito.</p>`,
        verse:{t:"Deus demonstra o seu amor pelo fato de Cristo ter morrido em nosso favor quando ainda éramos pecadores.",r:"Romanos 5:8"} },
      { lbl:"Arrependimento", title:"Atravessar exige <em>decisão</em>",
        pts:["<strong>Abandonar a rebelião:</strong> Admitir pessoalmente o pecado e decidir deixá-lo.",
             "<strong>Reconhecer a insuficiência própria:</strong> Nossas boas obras não nos salvam.",
             "<strong>Confiar em Cristo:</strong> Entregar a vida a Ele como único Salvador e Senhor."],
        verse:{t:"Se confessarmos os nossos pecados, ele é fiel e justo para perdoar e nos purificar de toda injustiça.",r:"1 João 1:9"} },
      { lbl:"Conversão", title:"Da <em>performance</em> à confiança",
        body:`<p>Converter-se não é mudar de opinião — é mudar de dono. Abandonar a <strong>mentalidade de clube</strong> e abraçar a <strong>mentalidade de família</strong>.</p><p>O convite é de hoje. O momento de responder ao chamado da graça é o presente.</p>`,
        verse:{t:"Eis que estou à porta e bato; se alguém ouvir a minha voz e abrir a porta, entrarei e cearei com ele.",r:"Apocalipse 3:20"} },
      { lbl:"Ekklesia", title:"Conectados a um propósito <em>maior</em>",
        pts:["<strong>O que é a Igreja?</strong> Não é um prédio, mas uma assembleia de pessoas que confessam que Jesus é o Senhor.",
             "<strong>Batismo:</strong> Declaração pública de que morreste para a velha vida e ressuscitastes com Cristo.",
             "<strong>Comunidade e Palavra:</strong> Ninguém cresce sozinho. Une-te a uma comunidade local e mantém a vida devocional diária."],
        verse:{t:"Assim como o Pai me enviou, eu também os envio.",r:"João 20:21"} }
    ]
  }
];

let cur=null, curCard=0;
let done=JSON.parse(localStorage.getItem('ir3')||'{}');

function renderHome(){
  const list=document.getElementById('studyList');
  list.innerHTML='';
  STUDIES.forEach(s=>{
    const d=!!done[s.id], el=document.createElement('div');
    el.className='study-card'+(d?' done':'');
    el.innerHTML=`<div class="s-num">${String(s.id).padStart(2,'0')}</div>
      <div class="s-info"><div class="s-name">${s.title}</div><div class="s-desc">${s.sub}</div></div>
      <div class="s-arrow">${d?'✓':'›'}</div>`;
    el.addEventListener('click',()=>openStudy(s));
    list.appendChild(el);
  });
}

function openStudy(s){
  cur=s; curCard=0;
  document.getElementById('home').classList.remove('active');
  document.getElementById('study').classList.add('active');
  document.getElementById('topNum').textContent=`Estudo ${String(s.id).padStart(2,'0')}`;
  document.getElementById('topName').textContent=s.title;
  document.getElementById('donePill').style.display=done[s.id]?'':'none';
  buildCards(s); buildDots(s.cards.length+2); goTo(0);
}

function buildCards(s){
  const area=document.getElementById('cardArea');
  area.innerHTML='';
  const total=s.cards.length+2;

  // Video card
  const vc=mk('div','scard'); vc.dataset.idx=0;
  vc.innerHTML=`
    <div class="c-label">Vídeo · ${s.title}</div>
    <div class="c-title">Assiste <em>antes de começar</em></div>
    <a class="video-thumb-wrap" href="https://youtu.be/${s.yt}" target="_blank" rel="noopener">
      <img src="https://img.youtube.com/vi/${s.yt}/hqdefault.jpg" alt="Assistir no YouTube"
           onerror="this.style.background='#1C1917';this.style.height='180px'">
      <div class="play-btn">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M8 5v14l11-7L8 5z" fill="#1C1917"/></svg>
      </div>
      <div class="video-label">▶ Abrir no YouTube</div>
    </a>
    <p class="video-note">Toca na imagem — abre o YouTube →</p>`;
  area.appendChild(vc);

  // Content cards
  s.cards.forEach((c,i)=>{
    const el=mk('div','scard'); el.dataset.idx=i+1;
    let h=`<div class="c-label">${c.lbl}</div><div class="c-title">${c.title}</div>`;
    if(c.body) h+=`<div class="c-body">${c.body}</div>`;
    if(c.pts){ h+='<ul class="points-list">'; c.pts.forEach(p=>h+=`<li>${p}</li>`); h+='</ul>'; }
    if(c.verse) h+=`<div class="verse-box"><p>"${c.verse.t}"</p><cite>${c.verse.r}</cite></div>`;
    if(c.opt) h+=`<div class="optional-box"><div class="opt-label">📖 Leitura Opcional</div><p>${c.opt}</p></div>`;
    el.innerHTML=h; area.appendChild(el);
  });

  // Final card
  const fc=mk('div','scard final-scard'); fc.dataset.idx=total-1;
  const isDone=!!done[s.id];
  fc.innerHTML=`
    <div class="c-label">Concluído</div>
    <div class="final-icon">✝</div>
    <div class="c-title">Estudo <em>finalizado</em></div>
    <div class="c-body"><p>Parabéns por concluir o Estudo ${String(s.id).padStart(2,'0')} — <strong>${s.title}</strong>.</p><p style="margin-top:0.5rem;font-style:italic;color:var(--text3)">"Um dia de cada vez. Bíblico. Simples. Transformador."</p></div>
    <button class="complete-btn ${isDone?'done-st':''}" id="markBtn">${isDone?'✓ Marcado como concluído':'Marcar como concluído'}</button>`;
  area.appendChild(fc);

  document.getElementById('markBtn').addEventListener('click',()=>{
    done[s.id]=true;
    localStorage.setItem('ir3',JSON.stringify(done));
    document.getElementById('markBtn').textContent='✓ Marcado como concluído';
    document.getElementById('markBtn').classList.add('done-st');
    document.getElementById('donePill').style.display='';
    renderHome();
  });
}

function buildDots(n){
  const d=document.getElementById('navDots'); d.innerHTML='';
  for(let i=0;i<n;i++){const dot=mk('div','ndot'); d.appendChild(dot);}
}

function goTo(idx){
  const cards=document.querySelectorAll('.scard'), total=cards.length;
  cards.forEach(c=>{
    const ci=parseInt(c.dataset.idx);
    c.classList.remove('active','exit-l');
    if(ci===idx) c.classList.add('active');
    else if(ci<idx) c.classList.add('exit-l');
  });
  curCard=idx;
  document.querySelectorAll('.ndot').forEach((d,i)=>d.classList.toggle('active',i===idx));
  document.getElementById('progressFill').style.width=((idx+1)/total*100)+'%';
  const prev=document.getElementById('prevBtn'), next=document.getElementById('nextBtn');
  prev.disabled=idx===0; next.disabled=idx===total-1;
  next.textContent=idx===total-2?'Final →':'Próx. →';
  document.querySelectorAll('.scard.active').forEach(c=>c.scrollTop=0);
}

document.getElementById('backBtn').addEventListener('click',()=>{
  document.getElementById('study').classList.remove('active');
  document.getElementById('home').classList.add('active');
});
document.getElementById('prevBtn').addEventListener('click',()=>{if(curCard>0)goTo(curCard-1);});
document.getElementById('nextBtn').addEventListener('click',()=>{
  const t=document.querySelectorAll('.scard').length;
  if(curCard<t-1)goTo(curCard+1);
});

let sx=0;
document.getElementById('cardArea').addEventListener('touchstart',e=>sx=e.touches[0].clientX,{passive:true});
document.getElementById('cardArea').addEventListener('touchend',e=>{
  const d=sx-e.changedTouches[0].clientX,t=document.querySelectorAll('.scard').length;
  if(d>50&&curCard<t-1)goTo(curCard+1);
  if(d<-50&&curCard>0)goTo(curCard-1);
},{passive:true});

document.addEventListener('keydown',e=>{
  if(!document.getElementById('study').classList.contains('active'))return;
  const t=document.querySelectorAll('.scard').length;
  if(e.key==='ArrowRight'&&curCard<t-1)goTo(curCard+1);
  if(e.key==='ArrowLeft'&&curCard>0)goTo(curCard-1);
});

function mk(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
renderHome();
</script>
</body>
</html>
